<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forget Me Not</title>

  <!-- Google Maps JavaScript API - Using v=beta for new Places API -->
  <!-- NOTE: never hardcode a real key here. Inject it at build time from an
       env var (e.g. EXPO_PUBLIC_GOOGLE_PLACES_API_KEY) and restrict the key
       to your domain/app in the Google Cloud console. -->
  <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_MAPS_API_KEY&libraries=places&v=weekly"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
    }

    #root {
      height: 100%;
      width: 100%;
      display: flex;
      flex-direction: column;
    }
  </style>
</head>
<body>
  <div id="root"></div>
</body>
</html>
